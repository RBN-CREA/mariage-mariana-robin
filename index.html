<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariana & Robin — Mariage · Casamento</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
img {
  max-width: 100%;
  height: auto;
  object-fit: contain;
  display: block;
}
:root{
  --tc:#C66B49; --am:#E8A856;
  --cr:#f5ede3; --dk:#3a2e28; --md:#7a6358;
}

body {
  font-family:'Jost',sans-serif;
  color:var(--dk);
  overflow-x:hidden;
  background-color: #f5ede3;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  z-index:-1;
  background-image: url("ASSET/FOND SITE HTML.png");
  background-repeat: repeat-y;
  background-size: 100% auto;
  background-position: top center;
}

/* ══════════════════════════════════
   ECRAN DE CHOIX DE LA LANGUE
══════════════════════════════════ */
#lp {
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;
  overflow-y:auto;
  padding: clamp(.5rem,1.5vh,1.2rem) 1rem clamp(.8rem,2vh,1.5rem);
  gap:0;
}

.lp-logo {
  width: min(1000px, 95vw);
  max-height: 25vh;
  opacity:0;animation:fu .9s ease .1s forwards;
  flex-shrink:0;
}
.lp-logo img{width:100%;display:block;}

.lp-choices {
  display:flex;
  gap:clamp(1rem, 10vw, 3rem);
  justify-content:center;
  align-items:center;
  opacity:0;animation:fu .9s ease .7s forwards;
  flex:1;
  width:100%;
  min-height:0;
}
.lp-choice {
  display:flex;flex-direction:column;align-items:center;gap:.6rem;
  cursor:pointer;
  transition:transform .3s;
  flex:0 1 auto;
  min-width:140px;
  min-height:0;
  text-decoration: none; /* Évite que les textes se soulignent */
}
.lp-choice:hover{transform:translateY(-10px);}
.lp-choice img {
  width:auto;
  height:clamp(180px, 35vh, 480px);
  max-width:40vw;
  object-fit:contain;
  filter:drop-shadow(0 8px 28px rgba(198,107,73,.22));
  transition:filter .3s;
}
.lp-choice:hover img{filter:drop-shadow(0 18px 42px rgba(198,107,73,.4));}
.lp-cta {
  font-size:clamp(.58rem,.78vw,.7rem);letter-spacing:.18em;text-transform:uppercase;
  color:var(--md);border-bottom:1px solid rgba(198,107,73,.3);
  padding-bottom:2px;transition:color .2s,border-color .2s;
  flex-shrink:0;
}
.lp-choice:hover .lp-cta{color:var(--tc);border-color:var(--tc);}

@keyframes fu{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:700px){
  .lp-choices{flex-direction:column;align-items:center;gap:1rem;}
  .lp-choice{max-width:min(320px,85vw);}
  .lp-choice img{height:clamp(160px,40vw,280px);}
}
@media(max-width:480px){
  .lp-choice img{height:clamp(140px,45vw,240px);}
}
</style>
</head>
<body>

  <div id="lp">
    <div class="lp-logo">
      <img src="ASSET/Couverture_langue.png" alt="Mariana & Robin">
    </div>
    <div class="lp-choices">
      <!-- Redirection vers le dossier Français -->
      <a class="lp-choice" href="fr/accueil.html">
        <img src="ASSET/Illustration FR.png" alt="Français">
        <span class="lp-cta">Continuer en français</span>
      </a>
      <!-- Redirection vers le dossier Portugais -->
      <a class="lp-choice" href="pt/accueil.html">
        <img src="ASSET/Illustration BR.png" alt="Português">
        <span class="lp-cta">Continuar em português</span>
      </a>
    </div>
  </div>

</body>
</html>
